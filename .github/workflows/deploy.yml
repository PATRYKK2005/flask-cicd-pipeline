name: CI/CD Pipeline - Self Hosted Runner

on:
  push:
    branches:
      - self-hosted-runner

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/flask-cicd-pipeline:latest

      - name: Deploy
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/flask-cicd-pipeline:latest
          docker stop flask-app || true
          docker rm flask-app || true
          docker run -d \
            --name flask-app \
            --network flask-network \
            -p 5000:5000 \
            -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
            ${{ secrets.DOCKER_USERNAME }}/flask-cicd-pipeline:latest